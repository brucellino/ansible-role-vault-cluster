---
# Vault configuration tasks file
- name: Generate a Self Signed OpenSSL certificate
  community.crypto.x509_certificate:
    path: "{{ vault_config_dir }}}/vault-cert.pem"
    privatekey_path: "{{ vault_config_dir }}/vault-key.pem"
    csr_path: "{{ vault_config_dir }}/vault.csr"
    provider: selfsigned
  failed_when: false

- name: Template configuration file
  ansible.builtin.template:
    src: etc/vault.d/config.hcl.j2
    dest: "{{ vault_config_dir }}/config.hcl"
    mode: "0644"
    owner: "{{ vault_user_name }}"
    group: "{{ vault_group_name }}"
    block_start_string: "[% "
    block_end_string: "%]"
    variable_start_string: "[["
    variable_end_string: "]]"
    trim_blocks: true
    output_encoding: utf-8
    # validate:

- name: Configure systemd unit
  ansible.builtin.template:
    src: etc/systemd/system/vault.service.j2
    dest: /etc/systemd/system/vault.service
    mode: "0644"
    owner: "{{ vault_user_name }}"
    group: "{{ vault_group_name }}"
    # validate: systemd-analyze verify %s
  notify: Systemd reload

- name: Enable Vault service
  ansible.builtin.systemd:
    name: vault
    state: started
    enabled: true
