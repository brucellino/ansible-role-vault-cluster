---
name: Release
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          experimental: true
          cache: true
      - name: Install requirements
        run: mise tasks run deps
      - name: Apply locally
        run: |
          eval "$(mise activate)"
          ansible-playbook -c local -i localhost, test/playbook.yml
        env:
          ANSIBLE_ROLES_PATH: "${GITHUB_WORKSPACE}/../"
      - name: Run Tests
        run: |
          eval "$(mise activate)"
          which py.test
          py.test --sudo ${PWD}/test
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          experimental: true
          cache: true
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          eval "$(mise activate)"
          npx semantic-release
