---
name: Release
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          experimental: true
          cache: true
      - name: Install requirements
        run: mise tasks run deps
      - name: Apply locally
        run: ansible-playbook -c local -i localhost, ${PWD}/test/playbook.yml
        env:
          ANSIBLE_ROLES_PATH: "${GITHUB_WORKSPACE}/../"
      - name: Check stuff
        run: whoami ; sudo find / -name "*.hcl"
      - name: Run Tests
        run: sudo -E py.test ${PWD}/test
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          experimental: true
          cache: true
      - name: add semantic release plugins
        run: |
          npm install -D '@semantic-release/changelog' \
                          '@semantic-release/git'
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
